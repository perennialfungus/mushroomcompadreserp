<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#244734" />
    <title>Offline | Mushroom Compadres</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f7f2e8;
        color: #1f2f27;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        max-width: 520px;
        border: 1px solid #d8c7ad;
        border-radius: 8px;
        background: #fffaf0;
        padding: 28px;
        box-shadow: 0 16px 40px rgb(31 47 39 / 12%);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.8rem, 5vw, 2.4rem);
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: #4d5a50;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Offline</h1>
      <p>
        The app shell is saved on this device, but this page was not available
        from cache. Reconnect to sync and load fresh operational screens.
      </p>
    </main>
  </body>
</html>
